<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>money diary - household account book</title>
    <link rel="stylesheet" href="./assets/css/sanitize.css">
    <link rel="stylesheet" href="./assets/css/base.css">
</head>

<body>
    <header>
        <h1>money diary</h1>
    </header>

    <main>
        <div class="summary-container">
            <div class="summary-card">
                <h3>Monthly Total</h3>
                <p id="amount-month">0</p>
            </div>

            <div class="summary-card">
                <a href="./partials/database.html" class="button button-secondary">View History</a>
            </div>
        </div>

        <div id="entry-container">
            <div class="date-time-inputs">
                <label>Date: <input type="date" id="date"></label>
                <label>Time: <input type="time" id="time"></label>
            </div>

            <div class="entry-row entry-item">
                <div class="entry-item-fields">
                    <label>Category:
                        <select class="category">
                            <option value="food">food</option>
                            <option value="entertainment">entertainment</option>
                            <option value="leisure">leisure</option>
                            <option value="transportation">transportation</option>
                            <option value="furniture">furniture</option>
                            <option value="utility">utility</option>
                            <option value="others">others</option>
                        </select>
                    </label>
                    <label>Amount: <input type="number" class="amount" min="0" placeholder="0"></label>
                    <label>Note: <input type="text" class="note" placeholder="Optional note"></label>
                    <button id="modal-open" class="button-modal" type="button">calc</button>
                </div>
                <div class="modal calc-modal"></div>
            </div>
        </div>

        <div class="action-buttons-group">
            <button type="button" id="add-entry-row" class="button button-secondary">+ Add Item</button>
            <button id="button-add" class="button">Save Records</button>
        </div>

        <h2>Current Month History</h2>
        <div style="overflow-x: auto;">
            <table id="history">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Note</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="history-list"></tbody>
            </table>
        </div>

        <div style="margin-top: 2rem; text-align: center;">
            <button class="button button-secondary" onclick="exportCSV()">Export CSV</button>
        </div>

    </main>

    <footer>
        <p style="text-align: center; color: #777; margin: 2rem 0;">&copy; 2026 money diary</p>
    </footer>

    <script type="module" src="assets/js/main.js"></script>
    <script type="module" src="assets/js/calculator.js"></script>

</body>

</html>
